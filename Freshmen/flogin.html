<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMSU-Ease Login</title>
    <link rel="stylesheet" href="flogin.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
            <span class="name">WMSU-Ease</span>
        </div>
        <ul class="nav-links">
            <li>
                <a href="../index.html" style="display:flex; align-items:center; gap:6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <path d="M19 12H5"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Back to Home
                </a>
            </li>
        </ul>
    </nav>

    <div class="login-wrapper">
        <div class="login-card">

            <h1>Start Your College Application</h1>

            <form id="loginForm">
                <div class="field-group">
                    <label for="applicantType">Select Applicant Type</label>
                    <select id="applicantType" name="applicantType" required>
                        <option value="">Choose...</option>
                        <option value="freshman">Freshman</option>
                        <option value="shiftee">Shiftee</option>
                        <option value="transferee">Transferee</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="id">Enter ID</label>
                    <input
                        type="text"
                        id="id"
                        name="id"
                        placeholder="Enter your CET or Student ID"
                        required
                    />
                </div>

                <div class="options">
                        <p>Already Have an account? <a href="account.html">Sign In</a></p>
                    </div>

                <button type="submit" class="continue-btn">Continue</button>
            </form>

            <div id="alert" class="alert" style="display: none;"></div>

        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const type = document.getElementById('applicantType').value;
            const id = document.getElementById('id').value.trim();
            const alertDiv = document.getElementById('alert');
            if (!type || !id) {
                alertDiv.textContent = 'Please select an applicant type and enter your ID.';
                alertDiv.style.display = 'block';
                return;
            }
            alertDiv.style.display = 'none';
            let redirectUrl;
            switch(type) {
                case 'freshman':
                    redirectUrl = 'freshman-apply.html';
                    break;
                case 'shiftee':
                    redirectUrl = 'shiftee.html';
                    break;
                case 'transferee':
                    redirectUrl = 'freshman-apply.html';
                    break;
            }
            window.location.href = redirectUrl;
        });
    </script>

</body>
</html>
