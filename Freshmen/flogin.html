<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMSU-Ease Login</title>
    <link rel="stylesheet" href="flogin.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
            <span class="name">WMSU-Ease</span>
        </div>
        <ul class="nav-links">
            <li>
                <a href="../index.html" style="display:flex; align-items:center; gap:6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <path d="M19 12H5"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Back to Home
                </a>
            </li>
        </ul>
    </nav>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="card-header">
                <svg class="card-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                </svg>
                <h1>Welcome Back</h1>
                <p class="subtitle">Sign in to continue your enrollment</p>
            </div>

            <form id="loginForm" action="../Freshmen/enroll.html">
                <div class="field-group">
                    <label for="cetid">CET ID</label>
                    <input
                        type="text"
                        id="cetid"
                        name="cetid"
                        placeholder="Enter your CET ID"
                        inputmode="numeric"
                        pattern="[0-9]+"
                        maxlength="20"
                        required
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                    />
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <p class="register">
                No account yet? <a href="#">Contact the Registrar</a>
            </p>

        </div>
    </div>

</body>
</html>
