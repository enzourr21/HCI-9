<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMSU-Ease Login</title>
    <link rel="stylesheet" href="flogin.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
            <span class="name">WMSU-Ease</span>
        </div>
        <ul class="nav-links">
            <li>
                <a href="../index.html" style="display:flex; align-items:center; gap:6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <path d="M19 12H5"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Back to Home
                </a>
            </li>
        </ul>
    </nav>

    <div class="login-wrapper">
        <div class="login-card">

            <h1>Welcome Back</h1>

            <form id="loginForm">
                <div class="field-group">
                    <label for="id">Enter ID</label>
                    <input
                        type="text"
                        id="id"
                        name="id"
                        placeholder="Enter your CET or Student ID"
                        required
                    />
                </div>

                <div class="options">

                <button type="submit" class="continue-btn" href="freshman-account.html">Sign In</button>
            </form>

            <div id="alert" class="alert" style="display: none;"></div>

        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('id').value.trim();
            const alertDiv = document.getElementById('alert');
            if (!id) {
                alertDiv.textContent = 'Please enter your ID.';
                alertDiv.style.display = 'block';
                return;
            }
            alertDiv.style.display = 'none';

            const savedApp = localStorage.getItem('freshmanApp');
            if (savedApp) {
                window.location.href = 'freshman-account.html';
            } else {
                alertDiv.textContent = 'You don\'t have an account yet. Redirecting to create one...';
                alertDiv.style.display = 'block';
                setTimeout(function() {
                    window.location.href = 'flogin.html';
                }, 600);
            }
        });
    </script>

</body>
</html>
