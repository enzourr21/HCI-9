<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freshman Application</title>
    <link rel="stylesheet" href="freshman-apply.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
            <span class="name">WMSU-Ease</span>
        </div>
        <ul class="nav-links">
            <li>
                <a href="flogin.html" style="display:flex; align-items:center; gap:6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Log Out
                </a>
            </li>
        </ul>
    </nav>

    <div class="apply-wrapper">

        <!-- ══════════════ APPLICATION FORM ══════════════ -->
        <div class="apply-card" id="apply-card">
            <h1 class="apply-title">Freshman Application</h1>
            <p class="instructions">Fill in your details carefully. All fields are required.</p>

            <!-- STEPPER -->
            <div class="stepper">
                <div class="step-item active" data-step="1">
                    <div class="step-bubble">
                        <span class="s-num">1</span>
                        <svg class="s-chk" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <span class="step-lbl">Personal</span>
                </div>
                <div class="step-item" data-step="2">
                    <div class="step-bubble">
                        <span class="s-num">2</span>
                        <svg class="s-chk" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <span class="step-lbl">Percentiles</span>
                </div>
                <div class="step-item" data-step="3">
                    <div class="step-bubble">
                        <span class="s-num">3</span>
                        <svg class="s-chk" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <span class="step-lbl">Course</span>
                </div>
            </div>

            <form id="applyForm">

                <!-- STEP 1: Personal Information -->
                <div class="form-panel active" id="step1">
                    <h2 class="sec-head">Personal Information</h2>
                    <div class="field-group">
                        <label for="cetid">CET ID</label>
                        <input type="text" id="cetid" name="cetid" class="form-control" placeholder="Your CET ID" required>
                    </div>
                    <div class="field-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Your full name" required>
                    </div>
                    <div class="field-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="example@mail.com" required>
                    </div>
                    <div class="field-group">
                        <label for="contact">Contact Number</label>
                        <input type="tel" id="contact" name="contact" class="form-control" placeholder="e.g. 09123456789" required>
                    </div>
                    <button type="button" class="btn-crimson" id="nextStep1">Next</button>
                </div>

                <!-- STEP 2: Percentile Inputs -->
                <div class="form-panel" id="step2">
                    <h2 class="sec-head">Percentile Inputs</h2>
                    <div class="field-group">
                        <label for="english">English Proficiency Percentile</label>
                        <input type="number" id="english" name="english" class="form-control" placeholder="e.g. 90" min="0" max="100" required>
                    </div>
                    <div class="field-group">
                        <label for="reading">Reading Comprehension Percentile</label>
                        <input type="number" id="reading" name="reading" class="form-control" placeholder="e.g. 90" min="0" max="100" required>
                    </div>
                    <div class="field-group">
                        <label for="science">Science Process Skills Percentile</label>
                        <input type="number" id="science" name="science" class="form-control" placeholder="e.g. 90" min="0" max="100" required>
                    </div>
                    <div class="field-group">
                        <label for="quantitative">Quantitative Skills Percentile</label>
                        <input type="number" id="quantitative" name="quantitative" class="form-control" placeholder="e.g. 90" min="0" max="100" required>
                    </div>
                    <div class="field-group">
                        <label for="abstract">Abstract Thinking Skills Percentile</label>
                        <input type="number" id="abstract" name="abstract" class="form-control" placeholder="e.g. 90" min="0" max="100" required>
                    </div>
                    <div class="field-group">
                        <label for="oapr">Overall Ability Percentile Rank (OAPR)</label>
                        <input type="number" id="oapr" name="oapr" class="form-control oapr-input" placeholder="e.g. 90" min="0" max="100" required>
                    </div>
                    <div class="flex-row">
                        <button type="button" class="btn-back" id="backStep2">Back</button>
                        <button type="button" class="btn-crimson flex-1" id="nextStep2">Next</button>
                    </div>
                </div>

                <!-- STEP 3: Course Selection -->
                <div class="form-panel" id="step3">
                    <h2 class="sec-head">Course Selection</h2>
                    <div class="field-group">
                        <label for="course">Select Course to Apply</label>
                        <select id="course" name="course" class="form-control" required>
                            <option value="">Choose a course...</option>
                                <option value="BS Agriculture">BS Agriculture</option>
                                <option value="BS Agri Business">BS Agri Business</option>
                                <option value="BS Food Technology">BS Food Technology</option>
                                <option value="BS Islamic Studies">BS Islamic Studies</option>
                                <option value="BS Asian Studies">BS Asian Studies</option>
                                <option value="BS Computer Science">BS Computer Science</option>
                                <option value="BS Information Technology">BS Information Technology</option>
                                <option value="Associate in Computer Technology major in Networking Application Development">Associate in Computer Technology major in Networking Application Development</option>
                                <option value="BS Criminology">BS Criminology</option>
                                <option value="BS Civil Engineering">BS Civil Engineering</option>
                                <option value="BS Mechanical Engineering">BS Mechanical Engineering</option>
                                <option value="BS Sanitary Engineering">BS Sanitary Engineering</option>
                                <option value="BS Industrial Engineering">BS Industrial Engineering</option>
                                <option value="BS Agricultural Biosystem Engineering">BS Agricultural Biosystem Engineering</option>
                                <option value="BS Environmental Engineering">BS Environmental Engineering</option>
                                <option value="BS Geodetic Engineering">BS Geodetic Engineering</option>
                                <option value="BS Electronics Communication Engineering">BS Electronics Communication Engineering</option>
                                <option value="BS Computer Engineering">BS Computer Engineering</option>
                                <option value="BS Forestry">BS Forestry</option>
                                <option value="BS Environmental Science">BS Environmental Science</option>
                                <option value="BS Agro-Forestry">BS Agro-Forestry</option>
                                <option value="BS Home Economics">BS Home Economics</option>
                                <option value="BS Nutrition and Dietetics">BS Nutrition and Dietetics</option>
                                <option value="BS Hospitality Management">BS Hospitality Management</option>
                                <option value="Bachelor of Arts in English Language Studies (BAELS)">Bachelor of Arts in English Language Studies (BAELS)</option>
                                <option value="BS Journalism">BS Journalism</option>
                                <option value="BA Broadcasting">BA Broadcasting</option>
                                <option value="BS Economics">BS Economics</option>
                                <option value="BS Accountancy">BS Accountancy</option>
                                <option value="BA Political Science">BA Political Science</option>
                                <option value="BA Psychology">BA Psychology</option>
                                <option value="BS Business Administration">BS Business Administration</option>
                                <option value="BS Nursing">BS Nursing</option>
                        </select>
                    </div>
                    <div class="flex-row">
                        <button type="button" class="btn-back" id="backStep3">Back</button>
                        <button type="submit" class="btn-crimson flex-1">Submit Application</button>
                    </div>
                </div>

            </form>

            <div id="alert" class="form-alert" style="display:none;"></div>
        </div>

    </div><!-- end .apply-wrapper -->

    <script>
        let currentStep = 1;

        function showStep(step) {
            document.querySelectorAll('.form-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            document.querySelectorAll('.step-item').forEach((item, idx) => {
                const stepNum = idx + 1;
                item.classList.remove('active', 'done');
                if (stepNum < step) item.classList.add('done');
                else if (stepNum === step) item.classList.add('active');
            });
        }

        function showAlert(message) {
            const a = document.getElementById('alert');
            a.textContent = message;
            a.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('alert').style.display = 'none';
        }

        document.getElementById('nextStep1').addEventListener('click', function () {
            const cetid = document.getElementById('cetid').value.trim();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const contact = document.getElementById('contact').value.trim();
            if (!cetid || !name || !email || !contact) { showAlert('Please fill in all personal information fields.'); return; }
            hideAlert();
            currentStep = 2;
            showStep(currentStep);
        });

        document.getElementById('nextStep2').addEventListener('click', function () {
            const ids = ['english','reading','science','quantitative','abstract','oapr'];
            let valid = true;
            ids.forEach(id => {
                const v = document.getElementById(id).value;
                if (!v.trim() || +v < 0 || +v > 100) valid = false;
            });
            if (!valid) { showAlert('Please fill in all percentile fields with values between 0 and 100.'); return; }
            hideAlert();
            currentStep = 3;
            showStep(currentStep);
        });

        document.getElementById('backStep2').addEventListener('click', () => { currentStep = 1; showStep(currentStep); hideAlert(); });
        document.getElementById('backStep3').addEventListener('click', () => { currentStep = 2; showStep(currentStep); hideAlert(); });

        document.getElementById('applyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const course = document.getElementById('course').value;
            if (!course) { showAlert('Please select a course.'); return; }

            const oapr = Number(document.getElementById('oapr').value);
            if (Number.isNaN(oapr) || oapr < 0 || oapr > 100) { showAlert('Overall Ability Percentile Rank (OAPR) must be between 0 and 100.'); return; }
            if (oapr < 85) { showAlert('Your OAPR is below the required threshold of 85. Please improve your score or try again next intake.'); return; }

            const payload = {
                cetid: document.getElementById('cetid').value.trim(),
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                contact: document.getElementById('contact').value.trim(),
                course: course,
                english: Number(document.getElementById('english').value),
                reading: Number(document.getElementById('reading').value),
                science: Number(document.getElementById('science').value),
                quantitative: Number(document.getElementById('quantitative').value),
                abstract: Number(document.getElementById('abstract').value),
                oapr: oapr,
                applicationId: document.getElementById('cetid').value.trim(),
                submittedDate: new Date().toISOString(),
                status: 'Submitted'
            };

            localStorage.setItem('freshmanApp', JSON.stringify(payload));
            window.location.href = 'freshman-account.html';
        });
    </script>
</body>
</html>
