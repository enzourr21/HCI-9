<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
            <span class="name">WMSU-Ease</span>
        </div>
        <ul class="nav-links">
            <li>
                <a href="../index.html" style="display:flex; align-items:center; gap:6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <path d="M19 12H5"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Back to Home
                </a>
            </li>
        </ul>
    </nav>


    <div class="login-wrapper">
        <div class="login-card">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to continue your enrollment</p>

            <!-- ── RADIO TABS ── -->
            <input type="radio" name="role" id="tab-student" checked hidden>
            <input type="radio" name="role" id="tab-admin" hidden>

            <div class="role-switch">
                <label for="tab-student">Student</label>
                <label for="tab-admin">Admin</label>
            </div>

            <div class="forms">

                <!-- ── STUDENT FORM ── -->
                <form id="studentForm">
                    <label>Student Email</label>
                    <input type="email" placeholder="example@wmsu.edu.ph"
                        pattern="[a-zA-Z0-9._%+\-]+@wmsu\.edu\.ph"
                        title="Please use your WMSU email (@wmsu.edu.ph)">

                    <label>Password</label>
                    <div class="password-box">
                        <input type="password" placeholder="Enter password">
                    </div>

                    <div class="options">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#" class="forgot">Forgot Password?</a>
                    </div>

                    <a href="../login page/old student/subject.html" class="login-btn">Sign In</a>
                </form>

                <!-- ── ADMIN FORM ── -->
                <form id="adminForm">
                <label>Select Role</label>
                    <select id="adminRole">
                        <option value="">-- Role --</option>
                        <option value="misto">MISTO</option>
                        <option value="assessment">Assessment Office</option>
                        <option value="dean">College Dean</option>
                        <option value="dept-admin">Department Admin</option>
                        <option value="secretary">Secretary</option>
                        <option value="adviser">Adviser</option>
                    </select>

    <label>Admin Email</label>
    <input type="email" placeholder="example@wmsu.edu.ph"
        pattern="[a-zA-Z0-9._%+\-]+@wmsu\.edu\.ph"
        title="Please use your WMSU email (@wmsu.edu.ph)">

    <label>Password</label>
    <div class="password-box">
        <input type="password" placeholder="Enter password">
    </div>

    <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#" class="forgot">Forgot Password?</a>
    </div>

    <button type="button" class="login-btn" onclick="handleAdminLogin()">Sign In</button>
</form>

            </div>

            <p class="register">
                Don't have an account? <a href="#">Contact Registrar</a>
            </p>

        </div>
    </div>

    <script>
    function handleAdminLogin() {
        const role = document.getElementById('adminRole').value;
        
        // Base path is the "Admin" folder relative to this login.html
        const adminPath = "Admin/";

        if (!role || role === "") {
            alert("Please select an admin role first.");
            return;
        }

        switch(role) {
            case 'assessment':
                window.location.href = adminPath + "assessment/assessment_dashboard.html";
                break;
            case 'adviser':
                window.location.href = adminPath + "adviser/adviser_dashboard.html";
                break;
            default:
                // For roles not yet built, you can send them to a generic dashboard or an alert
                alert("This portal is currently under maintenance. Please contact MISTO.");
                break;
        }
    }
    </script>
</body>
</html>
