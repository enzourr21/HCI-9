<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar Portal — WMSU-Ease</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* ── Page shell: centers the card ── */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--light-gray);
    }

    .login-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px 20px;
    }

    /* ── Card ── */
    .login-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      padding: 40px 40px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Shield icon badge ── */
    .login-icon {
      width: 60px;
      height: 60px;
      background: var(--crimson);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      box-shadow: 0 4px 16px rgba(192,25,43,0.30);
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 4px;
      text-align: center;
    }
    .login-restricted {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 6px;
    }

    .login-divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 22px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.09);
    }

    /* ── Form ── */
    .login-form { width: 100%; }
    .form-group  { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
    .form-label  { font-size: 13px; font-weight: 600; color: var(--black); }

    .form-input {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid rgba(0,0,0,0.13);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      color: var(--black);
      background: var(--white);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input::placeholder { color: #b0b0b0; }
    .form-input:focus {
      border-color: var(--crimson);
      box-shadow: 0 0 0 3px rgba(192,25,43,0.10);
    }

    .input-wrap { position: relative; }
    .input-wrap .form-input { padding-right: 42px; }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 0;
      transition: color var(--transition);
    }
    .toggle-pw:hover { color: var(--crimson); }
    .toggle-pw svg   { width: 18px; height: 18px; }

    .form-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 14px 0 20px;
    }
    .remember-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .remember-label input[type="checkbox"] {
      accent-color: var(--crimson);
      width: 15px; height: 15px; cursor: pointer;
    }
    .forgot-link {
      font-size: 13px;
      font-weight: 600;
      color: var(--crimson);
      text-decoration: none;
      transition: opacity var(--transition);
    }
    .forgot-link:hover { opacity: 0.75; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--crimson);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition), transform 0.1s;
      box-shadow: 0 3px 10px rgba(192,25,43,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover  { background: var(--crimson-dark); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    .login-error {
      display: none;
      align-items: center;
      gap: 8px;
      background: #fff2f3;
      border: 1px solid #f5c0c5;
      color: #9b1422;
      font-size: 13px;
      padding: 10px 13px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      animation: shake 0.35s ease;
    }
    .login-error.show { display: flex; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      padding-bottom: 32px;
    }
    .login-footer a { color: var(--crimson); font-weight: 600; }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- NAVBAR (uses your existing .navbar + .logo classes) -->
  <nav class="navbar">
    <a href="../index.html" class="logo">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none">
        <polygon points="18,7 2,15 18,23 34,15" fill="#c0192b" fill-opacity=".18"
          stroke="#c0192b" stroke-width="2" stroke-linejoin="round"/>
        <path d="M8 18v6.5C8 27.5 12.5 30 18 30s10-2.5 10-5.5V18"
          stroke="#c0192b" stroke-width="2" stroke-linecap="round"/>
        <line x1="30" y1="15" x2="30" y2="22" stroke="#c0192b" stroke-width="2" stroke-linecap="round"/>
        <circle cx="30" cy="23.5" r="1.5" fill="#c0192b"/>
      </svg>
      <span class="name">WMSU-Ease</span>
    </a>
    <a href="../login.html"
       style="margin-left:auto;display:flex;align-items:center;gap:6px;
              font-size:14px;font-weight:500;color:var(--muted);text-decoration:none;
              transition:color 0.2s;"
       onmouseover="this.style.color='var(--crimson)'"
       onmouseout="this.style.color='var(--muted)'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to Login
    </a>
  </nav>

  <!-- LOGIN PAGE -->
  <main class="login-page">
    <div class="login-card">

      <div class="login-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
             stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>

      <h1 class="login-title">Registrar Portal</h1>
      <p class="login-restricted">Restricted access — authorized personnel only</p>
      <div class="login-divider">WMSU Office of the University Registrar</div>

      <div class="login-error" id="login-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" width="16" height="16">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-msg">Invalid credentials. Please try again.</span>
      </div>

      <form class="login-form" id="login-form" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Institutional Email</label>
          <input class="form-input" type="email" id="email"
                 placeholder="registrar@wmsu.edu.ph" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="password"
                   placeholder="Enter password" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" onclick="togglePassword()">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-meta">
          <label class="remember-label">
            <input type="checkbox" id="remember" /> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login" id="submit-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Sign In
        </button>
      </form>
    </div>

    <div class="login-footer">
      This portal is monitored. Unauthorized access attempts are logged.<br />
      For access issues, contact
      <a href="mailto:misto@wmsu.edu.ph">misto@wmsu.edu.ph</a>
    </div>
  </main>

  <script>
    function togglePassword() {
      const pw   = document.getElementById("password");
      const ico  = document.getElementById("eye-icon");
      const show = pw.type === "password";
      pw.type    = show ? "text" : "password";
      ico.innerHTML = show
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
             a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4
             c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19
             m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn   = document.getElementById("submit-btn");
      const err   = document.getElementById("login-error");
      const email = document.getElementById("email").value.trim();
      const pw    = document.getElementById("password").value;

      err.classList.remove("show");
      btn.disabled    = true;
      btn.textContent = "Signing in…";

      // Replace with a real API fetch when the backend is ready.
      setTimeout(() => {
        if (email.endsWith("@wmsu.edu.ph") && pw.length >= 6) {
          btn.textContent = "Redirecting…";
          setTimeout(() => { window.location.href = "Admin/Registrar/registrar_dashboard.html"; }, 400);
        } else {
          document.getElementById("error-msg").textContent =
            !email.endsWith("@wmsu.edu.ph")
              ? "Please use your @wmsu.edu.ph institutional email."
              : "Incorrect password. Please try again.";
          err.classList.add("show");
          btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg> Sign In`;
          btn.disabled = false;
          document.getElementById("password").value = "";
          document.getElementById("password").focus();
        }
      }, 900);
    }
  </script>

</body>
</html>
