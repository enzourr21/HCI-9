<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Office | WMSU-Ease</title>
    <link rel="stylesheet" href="../../../style.css"> 
    <link rel="stylesheet" href="assessment.css">
    <link rel="stylesheet" href="css/assessment_modal_additions.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-layout">
    <nav class="navbar">
        <div class="logo">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
            <span class="name">WMSU-Ease</span>
        </div>
        <ul class="nav-links">
            <li>
                <a href="../../login.html" style="display:flex; align-items:center; gap:6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Log Out
                </a>
            </li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="menu-items">
                <a href="#" class="menu-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                    Student Queue
                </a>
                <a href="#" class="menu-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                    On-Hold / Flags
                </a>
                <a href="#" class="menu-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    History
                </a>
            </div>

            <div class="quick-stats">
                <h4>Quick Stats</h4>
                <div class="stat-row">Total Students: <strong>24</strong></div>
                <div class="stat-row">Pending Assessment: <strong>9</strong></div>
                <div class="stat-row">Approved: <strong>12</strong></div>
            </div>
        </aside>

        <main class="content-area">
        <div class="content-header">
            <h2>My Queue</h2>
                <div class="search-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="studentSearch" placeholder="Search CET-ID or Name..." class="search-input">
                </div>
        </div>
        <div id="queue-body-cards" class="queue-list">
            <div class="student-card">
                <div class="card-header">
                    <div class="student-profile">
                        <div class="avatar">XG</div>
                            <div class="info-text">
                                <h3>Xandrea Kate B. Galimba</h3>
                                <p class="id-sub">2024-01234 • Year 1 • BSCS-1A</p>
                            </div>
                    </div>
                <span class="badge regular-status">REGULAR</span>
            </div>
        
                <div class="card-body">
                    <p><strong>Enrolled Subjects:</strong> 23.00 units</p>
                    <p><strong>Adviser:</strong> Prof. Maria Reyes</p>
                 </div>

            <button class="btn-assess-full" onclick="openAssessmentModal()">Assess Student</button>
            </div>
        </div>

    <div id="assessmentModal" class="modal-overlay">
        <div class="modal-wrapper">
            <button class="modal-close-btn" onclick="closeModal()">&times;</button>
        
            <div class="modal-container">
                <div class="panel-left audit-content"></div>

            <div class="panel-right">
                <div class="fee-summary-card">
                    <h3>Fee Summary</h3>
                    <div class="fee-list">
                        </div>
                    <button class="btn-approve">Confirm Assessment</button>
                </div>
            </div>
            </div>
        </div>
    </div>

</main>

    <div id="auditModal" class="modal-overlay">
        </div>

    <script src="assessment.js"></script>
</body>
</html>
