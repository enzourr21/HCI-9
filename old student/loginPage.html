<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - WMSU-Ease</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="../landingPage.css">
</head>
<body>

    <!-- ── NAVBAR ── -->
    <nav class="navbar">
        <div class="logo">
            <img src="../photos/hat.png" alt="logo" class="logo-img">
            <span class="name" style="color: black;">WMSU-Ease</span>
        </div>
        <div class="navbar-right">
            <div class="user-info">
                <span class="user-name">Juan Dela Cruz</span>
                <span class="user-id">2024-001234</span>
            </div>
            <a href="login.html" class="logout-btn">&#x2192; Logout</a>
        </div>
    </nav>

    <!-- ── MAIN LAYOUT ── -->
    <div class="layout">

        <!-- ── SIDEBAR ── -->
        <aside class="sidebar">
            <ul class="sidebar-links">
                <li><a href="#">&#128100; Profile</a></li>
                <li><a href="#" class="active">&#128214; Subjects</a></li>
                <li><a href="#">&#128462; Assessment</a></li>
                <li><a href="#">&#128197; Schedule</a></li>
                <li><a href="#">&#128179; Payment</a></li>
            </ul>
        </aside>

        <!-- ── MAIN CONTENT ── -->
        <main class="main-content">

            <!-- Enrollment Progress -->
            <div class="card">
                <h3 class="card-title">Enrollment Progress</h3>
                <div class="progress-track">

                    <div class="progress-step done">
                        <div class="progress-circle">&#128065;</div>
                        <div class="step-line done"></div>
                        <p class="step-label">Form Reviewing</p>
                        <span class="badge green">Completed</span>
                    </div>

                    <div class="progress-step done">
                        <div class="progress-circle">&#128100;</div>
                        <div class="step-line gray"></div>
                        <p class="step-label">Advising</p>
                        <span class="badge yellow">In Progress</span>
                    </div>

                    <div class="progress-step gray">
                        <div class="progress-circle gray">&#128462;</div>
                        <div class="step-line gray"></div>
                        <p class="step-label">Assessment</p>
                    </div>

                    <div class="progress-step gray">
                        <div class="progress-circle gray">&#80;</div>
                        <div class="step-line gray"></div>
                        <p class="step-label">Payment</p>
                    </div>

                    <div class="progress-step gray">
                        <div class="progress-circle gray">&#10003;</div>
                        <p class="step-label">Enlistment</p>
                    </div>

                </div>
            </div>

            <!-- Enrolled Subjects -->
            <div class="subjects-header">
                <h2 class="section-title">Enrolled Subjects</h2>
                <button class="btn-add">Add Subject</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">Total Units</p>
                    <p class="stat-value black">14</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Approved</p>
                    <p class="stat-value green">3</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Pending</p>
                    <p class="stat-value orange">2</p>
                </div>

            <!-- -->
            </div>

        </main>
    </div>

</body>
</html>
