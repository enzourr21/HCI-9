<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Office | WMSU-Ease</title>
    <link rel="stylesheet" href="../admin.css">
    <link rel="stylesheet" href="assessment.css">
</head>
<body class="admin-layout">

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
            <span class="name">WMSU-Ease</span>
        </div>
        <ul class="nav-links">
            <li>
                <a href="../../../login-pages/adminLogin.html" style="display:flex;align-items:center;gap:6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Log Out
                </a>
            </li>
        </ul>
    </nav>

    <div class="main-wrapper">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="menu-items">
                <a href="#" class="menu-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                    </svg>
                    Student Queue
                </a>
                <a href="processed.html" class="menu-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    On-Hold / Flags
                </a>
                <a href="reviewed.html" class="menu-item">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    History
                </a>
            </div>

            <div class="quick-stats">
                <h4>Quick Stats</h4>
                <div class="stat-row">
                    <span>Total Students</span>
                    <strong>24</strong>
                </div>
                <div class="stat-row">
                    <span>Pending</span>
                    <strong id="stat-pending">—</strong>
                </div>
                <div class="stat-row">
                    <span>Assessed</span>
                    <strong id="stat-assessed">—</strong>
                </div>
            </div>
        </aside>

        <main class="content-area">
            <div class="content-header">
                <h2>My Queue</h2>
                <div class="search-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="studentSearch" placeholder="Search CET-ID or Name..." class="search-input">
                </div>
            </div>

            <!-- Cards injected here by assessment.js → loadQueue() → buildQueueCard() -->
            <div id="queue-body-cards" class="queue-list"></div>
        </main>
    </div>

    <!-- ═══════════════════════════════════════════
         SINGLE ASSESSMENT MODAL
         Left panel (.audit-content) and right panel fee list (.fee-list)
         are both populated dynamically by assessment.js →
         renderLeftPanel() and renderRightPanel()
    ═══════════════════════════════════════════ -->
    <div id="assessmentModal" class="modal-overlay">
        <div class="modal-wrapper">
            <button class="modal-close-btn" onclick="closeModal()">&times;</button>

            <div class="modal-container">

                <!-- LEFT: injected by renderLeftPanel(student) -->
                <div class="panel-left audit-content"></div>

                <!-- RIGHT: fee card shell; .fee-list injected by renderRightPanel(student) -->
                <div class="panel-right">
                    <div class="fee-summary-card">
                        <h3 class="fee-title">Fee Summary</h3>
                        <!-- renderRightPanel() writes into this div -->
                        <div class="fee-list"></div>
                        <button class="btn-approve">Confirm Assessment</button>
                        <button class="btn-hold" onclick="closeModal()">Flag / Put on Hold</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="assessment.js"></script>
</body>
</html>
